<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Listing Calendar — LenaTemplate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #17171d;
    --surface2: #1e1e26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #7a7a8e;
    --accent: #c9a96e;
    --accent2: #e8c98a;

    --c-high: #e05c5c;
    --c-high-bg: rgba(224,92,92,0.12);
    --c-urgent: #e07a3a;
    --c-urgent-bg: rgba(224,122,58,0.12);
    --c-soon: #d4b84a;
    --c-soon-bg: rgba(212,184,74,0.12);
    --c-ok: #5cba7a;
    --c-ok-bg: rgba(92,186,122,0.12);
    --c-far: #5a9fd4;
    --c-far-bg: rgba(90,159,212,0.12);

    --cat-us: #5a9fd4;
    --cat-intl: #5cba7a;
    --cat-sport: #d4a44a;
    --cat-life: #c96eaf;
    --cat-religious: #9e7ad4;
    --cat-seasonal: #e07a5a;
    --cat-social: #5ac4c4;
    --cat-asian: #e0a05a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Header */
  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent2); letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-left: 18px; }

  /* Controls */
  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn {
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); color: var(--text); }
  .btn.active { background: var(--accent); color: #0f0f13; border-color: var(--accent); font-weight: 500; }

  .view-toggle { display: flex; gap: 4px; margin-left: auto; }
  .vbtn {
    padding: 5px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .vbtn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* Stats bar */
  .stats-bar {
    padding: 10px 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat { font-size: 12px; color: var(--muted); }
  .stat b { color: var(--text); font-weight: 500; }
  .stat.urgent b { color: var(--c-high); }

  /* Calendar View */
  #calendarView { padding: 20px 24px; }
  .month-block { margin-bottom: 32px; }
  .month-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .month-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent2);
    letter-spacing: 0.02em;
  }
  .month-year { font-size: 13px; color: var(--muted); }
  .month-line { flex: 1; height: 1px; background: var(--border); }
  .month-count { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 99px; }

  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .event-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .event-card.pri-high::before { background: var(--c-high); }
  .event-card.pri-urgent::before { background: var(--c-urgent); }
  .event-card.pri-soon::before { background: var(--c-soon); }
  .event-card.pri-ok::before { background: var(--c-ok); }
  .event-card.pri-far::before { background: var(--c-far); }

  .event-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .event-card.hidden { display: none; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .cat-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 3px;
  }
  .cat-us .cat-dot { background: var(--cat-us); }
  .cat-intl .cat-dot { background: var(--cat-intl); }
  .cat-sport .cat-dot { background: var(--cat-sport); }
  .cat-life .cat-dot { background: var(--cat-life); }
  .cat-religious .cat-dot { background: var(--cat-religious); }
  .cat-seasonal .cat-dot { background: var(--cat-seasonal); }
  .cat-social .cat-dot { background: var(--cat-social); }
  .cat-asian .cat-dot { background: var(--cat-asian); }

  .card-dates { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .date-chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .date-event { background: var(--surface2); color: var(--muted); }
  .date-deadline { color: #0f0f13; font-weight: 500; }
  .deadline-high { background: var(--c-high); }
  .deadline-urgent { background: var(--c-urgent); }
  .deadline-soon { background: var(--c-soon); }
  .deadline-ok { background: var(--c-ok); }
  .deadline-far { background: var(--c-far); }

  .card-angle { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .card-market { font-size: 10px; color: var(--muted); margin-top: 6px; }

  .badge-pri {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 99px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .pri-high .badge-pri { background: var(--c-high-bg); color: var(--c-high); border: 1px solid rgba(224,92,92,0.3); }
  .pri-urgent .badge-pri { background: var(--c-urgent-bg); color: var(--c-urgent); border: 1px solid rgba(224,122,58,0.3); }
  .pri-soon .badge-pri { background: var(--c-soon-bg); color: var(--c-soon); border: 1px solid rgba(212,184,74,0.3); }
  .pri-ok .badge-pri { background: var(--c-ok-bg); color: var(--c-ok); border: 1px solid rgba(92,186,122,0.3); }
  .pri-far .badge-pri { background: var(--c-far-bg); color: var(--c-far); border: 1px solid rgba(90,159,212,0.3); }

  /* List View */
  #listView { padding: 0 24px 20px; display: none; }
  .list-section { margin-bottom: 24px; }
  .list-month-header {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent);
    padding: 12px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .list-row {
    display: grid;
    grid-template-columns: 24px 1fr 120px 120px 80px 80px;
    gap: 10px;
    padding: 9px 8px;
    border-radius: 6px;
    align-items: center;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .list-row:hover { background: var(--surface2); }
  .list-row.hidden { display: none; }
  .list-dot { width: 7px; height: 7px; border-radius: 50%; }
  .list-name { font-weight: 500; color: var(--text); }
  .list-sub { font-size: 10px; color: var(--muted); }
  .list-date { color: var(--muted); }
  .list-deadline { font-weight: 500; }
  .dl-high { color: var(--c-high); }
  .dl-urgent { color: var(--c-urgent); }
  .dl-soon { color: var(--c-soon); }
  .dl-ok { color: var(--c-ok); }
  .dl-far { color: var(--c-far); }
  .list-cat { font-size: 10px; color: var(--muted); }
  .list-market { font-size: 10px; color: var(--muted); }
  .list-header {
    display: grid;
    grid-template-columns: 24px 1fr 120px 120px 80px 80px;
    gap: 10px;
    padding: 6px 8px;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Legend */
  .legend {
    padding: 12px 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Empty state */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .controls { padding: 12px 16px; }
    #calendarView { padding: 14px 16px; }
    #listView { padding: 0 16px 14px; }
    .events-grid { grid-template-columns: 1fr; }
    .list-row { grid-template-columns: 20px 1fr 100px 100px; }
    .list-row > *:nth-child(5), .list-row > *:nth-child(6) { display: none; }
    .list-header > *:nth-child(5), .list-header > *:nth-child(6) { display: none; }
    input[type="text"] { width: 140px; }
  }
</style>
</head>

const catColors = {us:'var(--cat-us)',intl:'var(--cat-intl)',sport:'var(--cat-sport)',life:'var(--cat-life)',religious:'var(--cat-religious)',seasonal:'var(--cat-seasonal)',social:'var(--cat-social)',asian:'var(--cat-asian)'};
const catLabels = {us:'🇺🇸 US',intl:'🌍 Intl',sport:'⚽ Sport',life:'🎂 Life',religious:'🕌 Religious',seasonal:'🍂 Seasonal',social:'🥂 Social',asian:'🌏 Asian'};
const priLabels = {high:'NOW!',urgent:'Urgent',soon:'Soon',ok:'Aman',far:'2027+',niche:'Niche',med:'Medium'};
const dlClass = {high:'deadline-high',urgent:'deadline-urgent',soon:'deadline-soon',ok:'deadline-ok',far:'deadline-far'};

let currentCat = 'all';
let currentSearch = '';
let highOnly = false;

function buildCalendar() {
  const months = {};
  events.forEach(e => {
    if (!months[e.month]) months[e.month] = [];
    months[e.month].push(e);
  });

  const cv = document.getElementById('calendarView');
  cv.innerHTML = '';
  const monthKeys = Object.keys(months).sort((a,b)=>Number(a)-Number(b));
  monthKeys.forEach(mk => {
    const block = document.createElement('div');
    block.className = 'month-block';
    block.dataset.month = mk;
    const mevents = months[mk];
    const mname = monthNames[mk] || mk;
    block.innerHTML = `
      <div class="month-header">
        <span class="month-name">${mname}</span>
        <div class="month-line"></div>
        <span class="month-count" id="mc-${mk}">${mevents.length} event</span>
      </div>
      <div class="events-grid" id="grid-${mk}"></div>
    `;
    cv.appendChild(block);
    const grid = block.querySelector(`#grid-${mk}`);
    mevents.forEach((e,i) => {
      const card = document.createElement('div');
      card.className = `event-card cat-${e.cat} pri-${e.deadlinePri}`;
      card.dataset.cat = e.cat;
      card.dataset.pri = e.pri;
      card.dataset.idx = events.indexOf(e);
      const dlCls = dlClass[e.deadlinePri] || 'deadline-far';
      const priL = e.deadlinePri === 'high' ? 'NOW!' : e.deadlinePri === 'urgent' ? 'URGENT' : e.deadlinePri === 'soon' ? 'Soon' : e.deadlinePri === 'ok' ? 'Aman' : 'Persiapan';
      card.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-name">${e.name}</div>
            ${e.sub ? `<div class="card-sub">${e.sub}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <div class="cat-dot" style="background:${catColors[e.cat]}"></div>
            <span class="badge-pri">${priL}</span>
          </div>
        </div>
        <div class="card-dates">
          <span class="date-chip date-event">📅 ${e.eventDate}</span>
          <span class="date-chip date-deadline ${dlCls}">🚀 Upload: ${e.deadlineDate}</span>
        </div>
        <div class="card-angle">${e.angle}</div>
        <div class="card-market">🌏 ${e.market}</div>
      `;
      grid.appendChild(card);
    });
  });
}

function buildList() {
  const months = {};
  events.forEach(e => {
    if (!months[e.month]) months[e.month] = [];
    months[e.month].push(e);
  });
  const lv = document.getElementById('listView');
  lv.innerHTML = `
    <div class="list-header">
      <div></div><div>Event</div><div>Tanggal Event</div><div>Deadline Upload</div><div>Kategori</div><div>Market</div>
    </div>
  `;
  const monthKeys = Object.keys(months).sort((a,b)=>Number(a)-Number(b));
  monthKeys.forEach(mk => {
    const sec = document.createElement('div');
    sec.className = 'list-section';
    sec.dataset.month = mk;
    sec.innerHTML = `<div class="list-month-header">${monthNames[mk] || mk}</div>`;
    lv.appendChild(sec);
    months[mk].forEach(e => {
      const dlC = {high:'dl-high',urgent:'dl-urgent',soon:'dl-soon',ok:'dl-ok',far:'dl-far'}[e.deadlinePri]||'dl-far';
      const row = document.createElement('div');
      row.className = 'list-row';
      row.dataset.cat = e.cat;
      row.dataset.pri = e.pri;
      row.dataset.idx = events.indexOf(e);
      row.innerHTML = `
        <div><div class="list-dot" style="background:${catColors[e.cat]}"></div></div>
        <div><div class="list-name">${e.name}</div>${e.sub?`<div class="list-sub">${e.sub}</div>`:''}</div>
        <div class="list-date">${e.eventDate}</div>
        <div class="list-deadline ${dlC}">${e.deadlineDate}</div>
        <div class="list-cat">${catLabels[e.cat]||e.cat}</div>
        <div class="list-market">${e.market}</div>
      `;
      sec.appendChild(row);
    });
  });
}

function applyFilters() {
  const calCards = document.querySelectorAll('.event-card');
  const listRows = document.querySelectorAll('.list-row');
  let visible = 0;
  let urgent = 0;
  const q = currentSearch.toLowerCase();
  const applyRow = (el) => {
    const catOk = currentCat === 'all' || el.dataset.cat === currentCat;
    const priOk = !highOnly || el.dataset.pri === 'high';
    const idx = parseInt(el.dataset.idx);
    const e = events[idx];
    const searchOk = !q || (e.name+e.sub+e.angle+e.market).toLowerCase().includes(q);
    const show = catOk && priOk && searchOk;
    el.classList.toggle('hidden', !show);
    if (show) {
      visible++;
      if (e.deadlinePri === 'high' || e.deadlinePri === 'urgent') urgent++;
    }
  };
  calCards.forEach(applyRow);
  listRows.forEach(applyRow);

  // Hide empty month blocks
  document.querySelectorAll('.month-block').forEach(b => {
    const mk = b.dataset.month;
    const grid = b.querySelector(`#grid-${mk}`);
    if (!grid) return;
    const vis = grid.querySelectorAll('.event-card:not(.hidden)').length;
    b.style.display = vis === 0 ? 'none' : '';
    const mc = document.getElementById(`mc-${mk}`);
    if (mc) mc.textContent = `${vis} event`;
  });
  document.querySelectorAll('.list-section').forEach(s => {
    const vis = s.querySelectorAll('.list-row:not(.hidden)').length;
    s.style.display = vis === 0 ? 'none' : '';
  });

  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('urgentCount').textContent = urgent;
}

function updateTotal() {
  document.getElementById('totalCount').textContent = events.length;
  document.getElementById('visibleCount').textContent = events.length;
  let urgent = 0;
  events.forEach(e => { if (e.deadlinePri==='high'||e.deadlinePri==='urgent') urgent++; });
  document.getElementById('urgentCount').textContent = urgent;
}

function filterCat(cat, btn) {
  highOnly = false;
  document.getElementById('highBtn').classList.remove('active');
  document.getElementById('highBtn').style.background = '';
  document.getElementById('highBtn').style.color = 'var(--c-high)';
  currentCat = cat;
  document.querySelectorAll('#catFilters .btn:not(#highBtn)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleHigh(btn) {
  highOnly = !highOnly;
  btn.classList.toggle('active', highOnly);
  if (highOnly) { btn.style.background='var(--c-high)'; btn.style.color='#0f0f13'; }
  else { btn.style.background=''; btn.style.color='var(--c-high)'; }
  applyFilters();
}

function doSearch(val) {
  currentSearch = val;
  applyFilters();
}

function setView(v, btn) {
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('calendarView').style.display = v==='calendar'?'block':'none';
  document.getElementById('listView').style.display = v==='list'?'block':'none';
}

buildCalendar();
buildList();
updateTotal();
</script>
